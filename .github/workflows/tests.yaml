name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports
        run: |
          python -c "from src.utils.spark import get_spark"
          python -c "from src.utils.quality_checks import QualityCheckResult"
          python -c "from src.jobs.transform_silver import clean_trips, add_rejection_reason"

      - name: Lint
        run: ruff check src tests

      - name: Run tests
        run: pytest -q
